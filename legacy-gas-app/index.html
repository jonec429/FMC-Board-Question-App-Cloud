    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .premium-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        .hover-lift {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .btn-gradient-yellow {
            background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%);
        }

        .btn-gradient-indigo {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
        }

        .pulse-soft {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            15% {
                transform: translateX(-6px);
            }

            30% {
                transform: translateX(5px);
            }

            45% {
                transform: translateX(-4px);
            }

            60% {
                transform: translateX(4px);
            }

            75% {
                transform: translateX(-3px);
            }

            90% {
                transform: translateX(2px);
            }
        }

        .animate-shake {
            animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes badgeSlideUp {
            0% {
                transform: translateY(120%) scale(0.85);
                opacity: 0;
            }

            60% {
                transform: translateY(-8%) scale(1.04);
                opacity: 1;
            }

            80% {
                transform: translateY(3%) scale(0.98);
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes badgePop {
            0% {
                transform: scale(0.5) rotate(-10deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.2) rotate(4deg);
                opacity: 1;
            }

            80% {
                transform: scale(0.95) rotate(-2deg);
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(90vh) rotate(720deg);
                opacity: 0;
            }
        }

        .badge-slide-up {
            animation: badgeSlideUp 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .badge-icon-pop {
            animation: badgePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .confetti-particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
            pointer-events: none;
        }

        .prose p {
            margin-bottom: 0.75rem;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        .highlight-active ::selection {
            background-color: #fde047;
            color: black;
        }

        /* Custom Checkbox Styles */
        .custom-checkbox input:checked+div {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .custom-checkbox input:checked+div svg {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-6 bg-red-50 text-red-900 rounded-xl border border-red-200 overflow-auto">
                            <h2 className="text-lg font-bold mb-2 flex items-center gap-2">Something went wrong.</h2>
                            <p className="text-sm mb-4">The application encountered an unexpected error while rendering this section.</p>
                            <pre className="text-xs bg-white p-4 rounded border border-red-100 whitespace-pre-wrap">
                                {this.state.error && this.state.error.toString()}
                                <br />
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>
                        </div>
                    );
                }
                return this.props.children;
            }

        // --- CUSTOM MODAL COMPONENTS ---

        // --- IMPORT SCREEN ---
        const ImportScreen = ({ onSaveFixed, onSaveBank, onCancel, showAlert }) => {

            const handleImport = () => {
                let rawInput = textRef.current.value.trim();
                if (!rawInput) return;

                let input = rawInput
                    .replace(/\*\*/g, '')
                    .replace(/__/g, '')
                    .replace(/[\u2018\u2019]/g, "'")
                    .replace(/[\u201C\u201D]/g, '"')
                    .replace(/\[cite_start\]/g, '')
                    .replace(/\[cite_end\]/g, '');

                const codeBlockMatch = input.match(/`{3}(?:json)?\s*([\s\S]*?)\s*`{3}/i);
                if (codeBlockMatch) input = codeBlockMatch[1];

                let questionsArray = [];

                try {
                    const firstBracket = input.indexOf('[');
                    const lastBracket = input.lastIndexOf(']');
                    if (firstBracket !== -1 && lastBracket > firstBracket) {
                        let jsonString = input.substring(firstBracket, lastBracket + 1);
                        jsonString = jsonString.replace(/,\s*([\]}])/g, '$1');
                        const parsed = JSON.parse(jsonString);

                        const normalize = (list) => list.map(q => {
                            if (q.options && typeof q.options === 'object' && !Array.isArray(q.options)) q.options = Object.values(q.options);
                            if (typeof q.correct === 'string') {
                                if (q.correct.match(/^[A-E]$/i)) q.correct = q.correct.toUpperCase().charCodeAt(0) - 65;

                                options: q.options || [],
                                correct: q.correct || 0,
                                explanation: q.explanation || "",
                                resource: q.resource || ""

                        });

                        if (Array.isArray(parsed)) questionsArray = normalize(parsed);

                            {isSaving ? "Saving to Cloud..." : mode === 'fixed' ? "Create Fixed Block" : "Append to Master Bank"}

                </div>
            );
        };
        const computeRiskLevel = (res, bsd) => {
            const today = new Date();
            const pastBlocks = (bsd || []).filter(b => new Date(b.endDate + 'T23:59:59') < today);
            const pastBlockCount = pastBlocks.length;
            let onTimeCount = 0;
            if (pastBlockCount > 0 && res.history && res.history.length > 0) {
                pastBlocks.forEach(block => {
                    const bs = new Date(block.startDate + 'T00:00:00');
                    const be = new Date(block.endDate + 'T23:59:59');
                    const hit = (res.history || []).some(h => {
                        const hd = new Date(h.date);
                        return !isNaN(hd) && hd >= bs && hd <= be;
                    });
                    if (hit) onTimeCount++;
                });
            }
            const onTimeRate = pastBlockCount > 0 ? onTimeCount / pastBlockCount : 1.0;
            const onTimePct = Math.round(onTimeRate * 100);
            const avg = res.attempts > 0 ? res.average : null;

            // --- NEW: ATTENDANCE TRACKING ---
            const attTarget = calculateAttendanceTarget(res.pgy);
            const actualAtt = res.totalAttendancePoints || 0;
            const attStatus = attTarget > 0 ? (actualAtt >= attTarget * 0.9 ? 'green' : actualAtt >= attTarget * 0.75 ? 'yellow' : 'red') : 'green';

            // THRESHOLDS: Red < 60%, Yellow 60-70%, Green > 70%
            // Overall level is the "worst" of quiz performance and attendance progress
            const isAtRisk = (avg !== null && avg < 60) || (pastBlockCount > 0 && onTimeRate < 0.5) || (attStatus === 'red');
            const isConcern = !isAtRisk && ((avg !== null && avg >= 60 && avg <= 70) || (pastBlockCount > 0 && onTimeRate < 0.75) || (attStatus === 'yellow'));

            const reasons = [];
            if (avg !== null && avg < 60) reasons.push(`Avg: ${avg}% (below 60%)`);
            else if (avg !== null && avg <= 70) reasons.push(`Avg: ${avg}% (yellow zone)`);

            if (pastBlockCount > 0 && onTimePct < 50) reasons.push(`On-time: ${onTimePct}%`);
            else if (pastBlockCount > 0 && onTimePct < 75) reasons.push(`On-time: ${onTimePct}%`);

            if (attStatus === 'red') reasons.push(`Attendance: ${actualAtt}/${attTarget} (Critical)`);
            else if (attStatus === 'yellow') reasons.push(`Attendance: ${actualAtt}/${attTarget} (Behind)`);

            if (reasons.length === 0 && avg !== null) reasons.push(`Avg: ${avg}% - Attendance: ${actualAtt}/${attTarget}`);
            else if (reasons.length === 0) reasons.push('No activity data yet');

            return { level: isAtRisk ? 'red' : isConcern ? 'yellow' : 'green', onTimeCount, onTimePct, pastBlockCount, reasons, attTarget, actualAtt, attStatus };
        };

        // --- ATTENDANCE TARGET HELPER ---
        const calculateAttendanceTarget = (pgyString) => {
            if (!pgyString) return 0;
            const match = pgyString.match(/20\d{2}/);
            if (!match) return 100; // Fallback
            const gradYear = parseInt(match[0]);
            const today = new Date();
            const academicEndYear = today.getMonth() >= 6 ? today.getFullYear() + 1 : today.getFullYear();

            // Class of 2026 (PGY3 in 2025-26), 2027 (PGY2), 2028 (PGY1)
            const pgyLevel = 3 - (gradYear - academicEndYear);
            const clampedLevel = Math.max(1, Math.min(3, pgyLevel));

            return clampedLevel * 100;
        };

        // --- BADGES & STREAKS HELPER ---
        const computeStreakAndBadges = (res, bsd, lbData, qotdProfile) => {
            const today = new Date();
            const pastBlocks = (bsd || []).filter(b => new Date(b.endDate + 'T23:59:59') < today).sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
            const totalQs = res.totalQuestionsCompleted || 0;
            const history = res.history || [];

            // Cumulative milestone (badges)
            const milestone = Math.floor(totalQs / 40);

            // Block streak: consecutive past blocks (most recent backwards) with >=40 Qs in period
            let blockStreak = 0;
            for (let i = pastBlocks.length - 1; i >= 0; i--) {
                const bs = new Date(pastBlocks[i].startDate + 'T00:00:00');
                const be = new Date(pastBlocks[i].endDate + 'T23:59:59');
                const qsInBlock = history.filter(h => {
                    const hd = new Date(h.date); return !isNaN(hd) && hd >= bs && hd <= be;
                }).reduce((sum, h) => sum + (h.total || 40), 0);
                if (qsInBlock >= 40) { blockStreak++; } else { break; }
            }

            // Leaderboard rank helpers
            let isTop3 = false, isClassLeader = false;
            if (lbData && lbData.residents) {
                const valid = lbData.residents.filter(r => r.pgy && r.pgy.toLowerCase().includes('class of'));
                const sorted = [...valid].sort((a, b) => b.totalPoints - a.totalPoints);
                const myRank = sorted.findIndex(r => r.email === (res.email || ''));
                if (myRank >= 0 && myRank < 3) isTop3 = true;
                const classmates = sorted.filter(r => r.pgy === res.pgy);
                if (classmates.length > 0 && classmates[0].email === (res.email || '')) isClassLeader = true;
            }

            const hasCustom = (res.customBlocksCompleted || 0) > 0;
            const hasPerfect = history.some(h => h.percentage === 100);

            const academicPoints = res.academicPoints || res.totalPoints || 0;

            const badges = [];
            if (milestone >= 1) badges.push({ icon: 'Zap', color: 'text-blue-500', label: 'First Steps', desc: '40+ questions answered' });
            if (academicPoints >= 100) badges.push({ icon: 'Award', color: 'text-amber-700', label: 'Bronze Scholar', desc: '100+ Academic Points' });
            if (academicPoints >= 200) badges.push({ icon: 'Award', color: 'text-slate-400', label: 'Silver Scholar', desc: '200+ Academic Points' });
            if (academicPoints >= 300) badges.push({ icon: 'Award', color: 'text-yellow-500', label: 'Gold Scholar', desc: '300+ Academic Points' });
            if (blockStreak >= 3) badges.push({ icon: 'TrendingUp', color: 'text-orange-500', label: 'On a Roll', desc: `${blockStreak} blocks in a row!` });
            if (milestone >= 5) badges.push({ icon: 'Activity', color: 'text-green-500', label: 'Consistent', desc: '200+ questions answered' });
            if (milestone >= 10) badges.push({ icon: 'BookOpen', color: 'text-indigo-500', label: 'Marathon', desc: '400+ questions answered' });
            if (hasPerfect) badges.push({ icon: 'Star', color: 'text-yellow-400', label: 'Perfect Score', desc: '100% on a quiz' });
            if (hasCustom) badges.push({ icon: 'Sliders', color: 'text-purple-500', label: 'Deep Dive', desc: 'Custom quiz completed' });
            if (isTop3) badges.push({ icon: 'Trophy', color: 'text-yellow-500', label: 'Top 3', desc: 'Leaderboard top 3' });
            if (isClassLeader) badges.push({ icon: 'Trophy', color: 'text-blue-500', label: 'Class Leader', desc: 'Highest in your class' });
            if (qotdProfile && qotdProfile.earlyBirds > 0) badges.push({ icon: 'Clock', color: 'text-amber-500', label: 'Early Bird', desc: 'First to complete a QOTD!' });
            if (qotdProfile && qotdProfile.streak >= 7) badges.push({ icon: 'Zap', color: 'text-orange-500', label: 'Daily Scholar', desc: '7-day QOTD streak' });
            if (qotdProfile && qotdProfile.count >= 30) badges.push({ icon: 'Calendar', color: 'text-teal-500', label: 'Month of Knowledge', desc: '30+ QOTDs answered' });

            return { milestone, blockStreak, badges };
        };
        // --- ATTENDANCE IMPORTER COMPONENT ---
        const AttendanceImporter = ({ isOpen, onClose, onImportComplete, showAlert, roster }) => {
            const { useState, useEffect, useRef } = React;
            const [mode, setMode] = useState('file'); // 'file' or 'paste'
            const [file, setFile] = useState(null);
            const [pasteText, setPasteText] = useState('');
            const [isParsing, setIsParsing] = useState(false);
            const [parsedRecords, setParsedRecords] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            const [importSummary, setImportSummary] = useState(null);

            // New: Mapping states
            const [unresolvedNames, setUnresolvedNames] = useState([]); // List of unknown report names
            const [mappings, setMappings] = useState({}); // { reportName: rosterName }
            const [isMappingMode, setIsMappingMode] = useState(false);

            const handleFileChange = (e) => {
                const f = e.target.files[0];
                if (f) {
                    setFile(f);
                    setParsedRecords([]); // Reset if new file chosen
                }
            };

            const parseFile = async () => {
                if (!file) return;
                setIsParsing(true);
                setParsedRecords([]);
                let diagnosticInfo = [];

                try {
                    const reader = new FileReader();
                    if (file.name.endsWith('.pdf')) {
                        reader.onload = async (e) => {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let allRecords = [];

                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const items = textContent.items;

                                let currentResident = "";
                                for (let j = 0; j < items.length; j++) {
                                    const text = items[j].str.trim();

                                    // Robust Name Detection: Handles "Last, First" or "First Last" or "First M. Last"
                                    const isNameFormat = (text.includes(',') && text.length > 4) || (text.trim().split(/\s+/).length >= 2 && text.length > 5);
                                    if (isNameFormat && !text.includes('Conference') && !text.includes('Report') && !text.includes('Page')) {
                                        currentResident = text;
                                    }

                                    // Flexible Date Detection
                                    const dateMatch = text.match(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}/);
                                    if (dateMatch && currentResident) {
                                        const dateStr = dateMatch[0];
                                        const topic = items[j + 1] ? items[j + 1].str.trim() : "Unknown Topic";

                                        // Broad Marker Detection: Any standard indicator or character in the logical checkmark column
                                        let isPresent = false;
                                        let foundMarker = "";
                                        for (let k = 1; k < 25; k++) { // Increased look-ahead to 25
                                            const checkItem = items[j + k];
                                            if (!checkItem) continue;
                                            const checkText = checkItem.str.trim().toLowerCase();
                                            // Check for specific symbols or any single char in a "standard" column distance
                                            if (['-', 'p', 'y', 'x', '-', 'present', '1', 'v', 'correct', 'attendance'].includes(checkText) || (checkText.length === 1 && checkText !== " " && !checkText.match(/[a-z0-9]/i))) {
                                                isPresent = true;
                                                foundMarker = checkText;
                                                break;
                                            }
                                        }

                                        if (isPresent) {
                                            const parts = dateStr.split(/[\/\-\.]/);
                                            const m = parts[0], d = parts[1], y = parts[2];
                                            const fullYear = y.length === 2 ? (parseInt(y) < 50 ? '20' + y : '19' + y) : y;
                                            const isoDate = `${fullYear}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                                            allRecords.push({ reportName: currentResident, date: isoDate, topic: topic, points: 1 });
                                        } else {
                                            diagnosticInfo.push({ type: 'PDF', name: currentResident, date: dateStr, reason: 'No presence marker found in row' });
                                        }
                                    }
                                }
                            }
                            finishParsing(allRecords, diagnosticInfo);
                        };
                        reader.readAsArrayBuffer(file);
                    } else if (file.name.endsWith('.csv')) {
                        // Custom CSV Parsing for residency reports
                        reader.onload = (e) => {
                            let text = (e.target.result || "").replace(/^\uFEFF/, ""); // Clean BOM
                            const lines = text.split(/\r?\n/);
                            const allRecords = [];
                            let diagnosticInfo = [];

                            // --- Proper quoted-CSV splitter (handles "Last, First" names correctly) ---
                            const splitCSV = (line) => {
                                const result = []; let cur = '', inQ = false;
                                for (let i = 0; i < line.length; i++) {
                                    if (line[i] === '"') { inQ = !inQ; }
                                    else if (line[i] === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                                    else { cur += line[i]; }
                                }
                                result.push(cur.trim());
                                return result;
                            };

                            // --- Name converter: "Last, First Middle" -> "First Last" ---
                            const convertName = (raw) => {
                                if (!raw) return raw;
                                const overrides = {
                                    "Nguyen, Thien ly Thuy": "Thienly Nguyen",
                                    "Nguyen, Thien Ly Thuy": "Thienly Nguyen",
                                    "Nguyen, Thienly": "Thienly Nguyen"
                                };
                                const trimmed = raw.trim();
                                if (overrides[trimmed]) return overrides[trimmed];
                                if (!trimmed.includes(',')) return trimmed;
                                const [last, rest] = trimmed.split(',');
                                const first = (rest || '').trim().split(' ')[0];
                                return `${first} ${last.trim()}`;
                            };

                            // --- Date extractor from "M/D/YYYY H:MM AM/PM" -> "YYYY-MM-DD" ---
                            const extractISODate = (raw) => {
                                if (!raw) return '';
                                const m = raw.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
                                if (!m) return '';
                                return `${m[3]}-${m[1].padStart(2, '0')}-${m[2].padStart(2, '0')}`;
                            };

                            if (lines.length < 2) { finishParsing([], diagnosticInfo); return; }

                            // --- Detect format from header row ---
                            const headerCols = splitCSV(lines[0]).map(h => h.toLowerCase().trim());
                            const residentIdx = headerCols.findIndex(h => h === 'resident');
                            const dateIdx = headerCols.findIndex(h => h === 'conference date' || h === 'date');
                            const topicIdx = headerCols.findIndex(h => h === 'topic');
                            const presentIdx = headerCols.findIndex(h => h === 'present');
                            const ptsIdx = headerCols.findIndex(h => h === 'academic points' || h === 'points');
                            const isNewFormat = residentIdx !== -1 && dateIdx !== -1;

                            if (isNewFormat) {
                                // === GEM OUTPUT FORMAT: Timestamp, Resident, Email, Conference Date, Topic, Present, Academic Points ===
                                for (let i = 1; i < lines.length; i++) {
                                    const line = lines[i];
                                    if (!line.trim()) continue;
                                    const cols = splitCSV(line);
                                    const rawName = cols[residentIdx] || '';
                                    const rawDate = cols[dateIdx] || '';
                                    const topic = (topicIdx !== -1 ? cols[topicIdx] : '') || 'Conference';
                                    const rawPresent = (presentIdx !== -1 ? cols[presentIdx] : '') || '';
                                    const rawPts = (ptsIdx !== -1 ? cols[ptsIdx] : '') || '';

                                    if (!rawName || rawName.toLowerCase() === 'resident') continue;

                                    let points = 1;
                                    if (rawPts !== '') {
                                        points = parseFloat(rawPts);
                                        if (isNaN(points)) points = 1;
                                    } else if (rawPresent.toLowerCase() === 'false' || rawPresent === '0') {
                                        points = 0;
                                    }

                                    const status = points > 0 ? 'Attended' : 'Absent';
                                    const reportName = convertName(rawName);
                                    const isoDate = extractISODate(rawDate);

                                    if (!isoDate) {
                                        if (i < 10) diagnosticInfo.push({ type: 'CSV', reason: `Row ${i + 1} skipped: Could not parse date "${rawDate}".` });
                                        continue;
                                    }
                                    allRecords.push({ reportName, category: 'Noon Conference', date: isoDate, topic, points, status });
                                }
                            } else {
                                // === LEGACY FORMAT: HTML-embedded New Innovations export ===
                                const stripTags = (html) => html ? html.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim() : '';
                                lines.forEach((line, idx) => {
                                    if (!line.trim()) return;
                                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                                    if (row.length < 3) return;
                                    const content = row[2] || '';
                                    const cells = Array.from(content.matchAll(/<td[^>]*>(.*?)<\/td>/gi)).map(m => m[1]);
                                    if (cells.length < 8) return;

                                    const rawPresent = stripTags(cells[7]).toLowerCase();
                                    let points = 1;
                                    if (rawPresent.includes('false') || rawPresent === '0') points = 0;

                                    const status = points > 0 ? 'Attended' : 'Absent';
                                    const rawName = stripTags(cells[1]);
                                    if (!rawName || rawName.toLowerCase().includes('person') || content.includes('Totals:')) return;
                                    const conference_raw = stripTags(cells[4]);
                                    const rawCategory = stripTags(cells[3]);
                                    const searchStr = (rawCategory + ' ' + conference_raw).toLowerCase();
                                    if (!searchStr.includes('noon') && !searchStr.includes('omm') && !searchStr.includes('omt')) return;
                                    const topic = conference_raw.split(' - ').pop().trim();
                                    const full_date = stripTags(cells[5]);
                                    const dateMatches = full_date.match(/(\d{1,2}\/\d{1,2}\/\d{4})/g) || [];
                                    if (!dateMatches.length && full_date) dateMatches.push(full_date.split(' ')[0].trim());
                                    dateMatches.forEach(dateStr => {
                                        const p = dateStr.split('/');
                                        if (p.length >= 3) {
                                            const y = p[2].length === 2 ? '20' + p[2] : p[2];
                                            allRecords.push({
                                                reportName: convertName(rawName),
                                                category: 'Noon Conference',
                                                date: `${y}-${p[0].padStart(2, '0')}-${p[1].padStart(2, '0')}`,
                                                topic,
                                                points,
                                                status
                                            });
                                        }
                                    });
                                });
                            }

                            finishParsing(allRecords, diagnosticInfo);
                        };
                        reader.readAsText(file);
                    } else {
                        // Excel/HTML Parsing
                        reader.onload = (e) => {
                            const data = e.target.result;
                            const workbook = XLSX.read(data, { type: 'binary' });
                            const ws = workbook.Sheets[workbook.SheetNames[0]];
                            const json = XLSX.utils.sheet_to_json(ws, { header: 1 });

                            let records = [];
                            let currentResidentName = null;
                            let pointsIdx = -1;
                            let presentIdx = -1;

                            // Pre-scan for headers in the first 20 rows
                            for (let r = 0; r < Math.min(json.length, 20); r++) {
                                const row = json[r];
                                if (!row) continue;
                                row.forEach((cell, idx) => {
                                    const s = String(cell || "").toLowerCase().trim();
                                    if (s === 'academic points' || s === 'points') pointsIdx = idx;
                                    if (s === 'present' || s === 'attendance' || s === 'status') presentIdx = idx;
                                });
                                if (pointsIdx !== -1 || presentIdx !== -1) break;
                            }

                            json.forEach((rawRow, rowIndex) => {
                                // 1. Fuzzy sanitization: replace tag endings with spaces, then strip all tags
                                const row = (rawRow || []).map(cell => {
                                    if (typeof cell === 'string') {
                                        return cell.replace(/<\/td>|<\/tr>|<\/b>/g, ' ')
                                            .replace(/<[^>]*>?/gm, '')
                                            .trim()
                                            .replace(/\s+/g, ' '); // Collapse spaces
                                    }
                                    return cell;
                                });

                                if (row && row.length >= 1) {
                                    // 1. IMPROVED NAME DETECTION
                                    // Look for "Last, First" pattern which is standard in these reports
                                    const potentialName = row.find(cell => {
                                        const s = String(cell || "").trim();
                                        return s.includes(',') && s.length > 5 && !s.includes('Report') && !s.includes('Page') && !s.includes('Date:');
                                    });

                                    if (potentialName) {
                                        // Clean up names that might include prefixes like "Resident: smith, john"
                                        currentResidentName = potentialName.replace(/^(Resident|Student|User|Name):\s*/i, '').trim();
                                    }

                                    // 2. ULTRA-PERMISSIVE DATE DETECTION
                                    let dateMatch = null;
                                    let foundCellIndex = -1;

                                    for (let i = 0; i < row.length; i++) {
                                        const cell = row[i];
                                        if (cell === null || cell === undefined) continue;

                                        // Try Excel serial number first
                                        if (typeof cell === 'number' && cell > 35000 && cell < 60000) {
                                            dateMatch = cell;
                                            foundCellIndex = i;
                                            break;
                                        }

                                        // Try string matching with high tolerance
                                        const s = String(cell).toLowerCase().replace(/\s+/g, '');
                                        // Matches 4/7/2026, 04-07-26, 4.7.2026, etc.
                                        const regexMatch = s.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](?:\d{4}|\d{2}))?/);
                                        if (regexMatch) {
                                            dateMatch = String(cell).trim();
                                            foundCellIndex = i;
                                            break;
                                        }

                                        // Try text-based months
                                        if (s.match(/\d{1,2}(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/)) {
                                            dateMatch = String(cell).trim();
                                            foundCellIndex = i;
                                            break;
                                        }
                                    }

                                    if (currentResidentName && dateMatch) {
                                        const dObj = (typeof dateMatch === 'number') ? new Date((dateMatch - (25567 + 1)) * 86400 * 1000) : new Date(dateMatch);

                                        // If short date (M/D), assume current year
                                        if (!isNaN(dObj)) {
                                            // Topic extraction: Look for the real conference topic
                                            // 1. Identify candidates (long enough, not the name, not a simple level label)
                                            const candidates = row.filter((cell, idx) => {
                                                if (idx === foundCellIndex) return false;
                                                const s = String(cell || "").trim();
                                                const lower = s.toLowerCase();
                                                if (s.length < 3) return false;
                                                if (lower.includes(currentResidentName.split(',')[0].toLowerCase())) return false;
                                                // Only block level labels if they are very short (e.g. "Resident, PGY 3")
                                                if (s.length < 20 && (lower.includes('resident') || lower.includes('level'))) return false;
                                                return true;
                                            });

                                            // 2. Pick the best candidate (usually the one with "::" or the longest one)
                                            let rawTopic = candidates.find(c => String(c).includes('::')) ||
                                                candidates.sort((a, b) => b.length - a.length)[0] ||
                                                "Conference Session";

                                            // 3. Clean up the clinical prefix (e.g. "Department... :: Noon Conference - Heart Failure")
                                            // We want "Heart Failure"
                                            let cleanTopic = String(rawTopic);
                                            if (cleanTopic.includes('::')) {
                                                cleanTopic = cleanTopic.split('::').pop();
                                            }
                                            if (cleanTopic.includes(' - ')) {
                                                cleanTopic = cleanTopic.split(' - ').pop();
                                            }
                                            const topic = cleanTopic.trim();

                                            let points = 1;
                                            let status = "Attended";

                                            if (pointsIdx !== -1 && row[pointsIdx] !== undefined) {
                                                const pVal = parseFloat(row[pointsIdx]);
                                                if (!isNaN(pVal)) points = pVal;
                                            } else if (presentIdx !== -1 && row[presentIdx] !== undefined) {
                                                const presVal = String(row[presentIdx]).toLowerCase().trim();
                                                if (presVal === 'false' || presVal === '0' || presVal === 'no' || presVal === 'absent') {
                                                    points = 0;
                                                }
                                            }

                                            status = points > 0 ? "Attended" : "Absent";

                                            records.push({
                                                reportName: currentResidentName,
                                                date: dObj.toISOString().split('T')[0],
                                                topic: topic,
                                                points: points,
                                                status: status
                                            });
                                        }
                                    } else if (rowIndex < 100) { // Limit diagnostics to avoid token issues
                                        // If we found something that LOOKS like a name but no date, log it
                                        if (potentialName) {
                                            diagnosticInfo.push({
                                                type: 'Excel',
                                                reason: `Resident Found: ${currentResidentName} (Row ${rowIndex + 1}) | Date Search Failed on this row.`
                                            });
                                        } else if (dateMatch) {
                                            diagnosticInfo.push({
                                                type: 'Excel',
                                                reason: `Found Date ${dateMatch} (Row ${rowIndex + 1}) | But no active Resident Name context.`
                                            });
                                        } else if (rowIndex < 10 && row.some(c => c)) {
                                            // For the first few rows, show raw content if no match at all
                                            diagnosticInfo.push({
                                                type: 'Excel',
                                                reason: `Row ${rowIndex + 1} Content: [${row.filter(c => c).slice(0, 3).join(' | ')}]`
                                            });
                                        }
                                    }
                                }
                            });
                            finishParsing(records, diagnosticInfo);
                        };
                        reader.readAsBinaryString(file);
                    }
                } catch (err) {
                    console.error(err);
                    showAlert("Parsing Error: " + err.message);
                    setIsParsing(false);
                }
            };

            const parsePaste = () => {
                if (!pasteText.trim()) return;
                setIsParsing(true);
                const records = [];

                // --- NEW: JSON DETECTION ---
                const trimmedPaste = pasteText.trim();
                const isJson = (trimmedPaste.startsWith('[') && trimmedPaste.endsWith(']')) || (trimmedPaste.startsWith('{') && trimmedPaste.endsWith('}'));

                if (isJson) {
                    try {
                        let jsonData = JSON.parse(trimmedPaste);
                        if (!Array.isArray(jsonData)) jsonData = [jsonData];

                        jsonData.forEach(item => {
                            const name = item.reportName || item.name || item.resident;
                            const dateRaw = item.date || item.conferenceDate;
                            const topic = item.topic || item.conference || "Unknown Conference";
                            const status = String(item.status || item.attendance || "Attended").toLowerCase();
                            const points = item.points !== undefined ? Number(item.points) : (status.includes("absent") || status.includes("missed") || status === "no" ? 0 : 1);

                            if (name && dateRaw) {
                                let isoDate = dateRaw;
                                if (dateRaw.includes('/')) {
                                    const parts = dateRaw.split('/');
                                    if (parts[0].length === 4) isoDate = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                                    else isoDate = `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                                }
                                records.push({ reportName: name, date: isoDate, topic, points, status: points > 0 ? "Attended" : "Absent" });
                            }
                        });
                        if (records.length > 0) {
                            finishParsing(records);
                            return;
                        }
                    } catch (e) { console.log("Paste was not valid JSON, falling back to text parsing", e); }
                }

                // --- FUZZY TEXT / CSV / TSV PARSING ---
                const lines = pasteText.split('\n').filter(l => l.trim());
                if (lines.length > 0) {
                    // Try to detect headers
                    const separator = pasteText.includes('\t') ? '\t' : ',';
                    const headers = lines[0].split(separator).map(s => s.trim().toLowerCase());

                    const nameIdx = headers.findIndex(h => h === "resident" || h === "name" || h === "reportname");
                    const dateIdx = headers.findIndex(h => h === "date" || h === "conference date");
                    const topicIdx = headers.findIndex(h => h === "topic" || h === "conference");
                    const ptsIdx = headers.findIndex(h => h === "academic points" || h === "points");
                    const presentIdx = headers.findIndex(h => h === "present" || h === "status");

                    const hasHeaders = nameIdx !== -1 && dateIdx !== -1;
                    const startIndex = hasHeaders ? 1 : 0;

                    // Proper quoted-CSV splitter for Smart Paste (handles "Last, First" names)
                    const splitPasteCSV = (line, sep) => {
                        if (sep !== ',') return line.split(sep).map(s => s.trim());
                        const result = []; let cur = '', inQ = false;
                        for (let i = 0; i < line.length; i++) {
                            if (line[i] === '"') { inQ = !inQ; }
                            else if (line[i] === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                            else { cur += line[i]; }
                        }
                        result.push(cur.trim());
                        return result;
                    };

                    for (let i = startIndex; i < lines.length; i++) {
                        let parts = splitPasteCSV(lines[i], separator);
                        if (parts.length < 2) continue; // Skip empty rows

                        let name = "", isoDate = "", topic = "Imported Session", points = 1, isAbsent = false;

                        if (hasHeaders) {
                            name = parts[nameIdx];
                            const dateRaw = parts[dateIdx];
                            if (!name || !dateRaw) continue;

                            // Parse Date
                            const dateMatch = dateRaw.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
                            if (dateMatch) {
                                const [_, m, d, y] = dateMatch;
                                const fullYear = (y && y.length === 2) ? (parseInt(y) < 50 ? '20' + y : '19' + y) : y;
                                isoDate = `${fullYear}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                            }

                            if (topicIdx !== -1 && parts[topicIdx]) topic = parts[topicIdx];

                            if (ptsIdx !== -1 && parts[ptsIdx] !== "") {
                                points = Number(parts[ptsIdx]);
                            } else if (presentIdx !== -1) {
                                const presVal = parts[presentIdx].toLowerCase();
                                if (presVal === "false" || presVal === "absent" || presVal === "no") {
                                    points = 0;
                                    isAbsent = true;
                                }
                            }
                        } else {
                            // Fallback to fuzzy logic (no headers detected)
                            name = parts[0];
                            const datePart = parts.find(p => p.match(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}/));

                            if (name && datePart) {
                                const dateMatch = datePart.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
                                if (dateMatch) {
                                    const [_, m, d, y] = dateMatch;
                                    const fullYear = (y && y.length === 2) ? (parseInt(y) < 50 ? '20' + y : '19' + y) : y;
                                    isoDate = `${fullYear}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                                }
                                let rawTopic = parts.slice(2).join(' ') || "Smart Paste Import";
                                if (rawTopic.includes('::')) rawTopic = rawTopic.split('::').pop();
                                topic = rawTopic.trim();

                                const lowerLine = lines[i].toLowerCase();
                                isAbsent = lowerLine.includes("absent") || lowerLine.includes("missed") || lowerLine.includes("\tno\t") || lowerLine.endsWith(" no");
                                points = isAbsent ? 0 : 1;
                            }
                        }

                        if (name && isoDate) {
                            records.push({
                                reportName: name,
                                date: isoDate,
                                topic: topic,
                                points: points,
                                status: points > 0 ? "Attended" : "Absent"
                            });
                        }
                    }
                }

                finishParsing(records);
            };

            const localMatchResident = (reportName) => {
                if (!reportName || !roster) return null;
                const clean = (s) => (s || "").toLowerCase().replace(/[^a-z\s]/g, "").replace(/\s+/g, " ").trim();
                const cr = clean(reportName);

                // Last, First -> First Last
                let nr = cr;
                if (reportName.includes(',')) {
                    const p = reportName.split(',');
                    nr = clean(p[1]) + " " + clean(p[0]);
                }

                return roster.find(r => {
                    const rn = clean(r.name);
                    return rn === cr || rn === nr.trim();
                });
            };

            const finishParsing = (records, diagnostics = []) => {
                setIsParsing(false);
                if (records.length === 0) {
                    let msg = "No matching records found.";
                    if (diagnostics.length > 0) {
                        const uniqueReasons = [...new Set(diagnostics.map(d => d.reason))].slice(0, 5);
                        msg += "\n\nDiagnostics (First 5 hints):\n- " + uniqueReasons.join("\n- ");
                    }
                    msg += "\n\nPlease check the file format or try 'Smart Paste' with copy-pasted text.";
                    showAlert(msg);
                } else {
                    // Identify unresolved names
                    const uniqueNames = [...new Set(records.map(r => r.reportName))];
                    const unknown = uniqueNames.filter(name => !localMatchResident(name));

                    if (unknown.length > 0) {
                        setUnresolvedNames(unknown);
                        setParsedRecords(records);
                        setIsMappingMode(true);
                    } else {
                        setParsedRecords(records);
                    }
                }
            };

            const commitImport = async () => {
                if (parsedRecords.length === 0) return;
                setIsSaving(true);

                try {
                    // 1. Save Overrides if any
                    const mappingEntries = Object.entries(mappings);
                    for (const [reportName, rosterName] of mappingEntries) {
                        if (rosterName) {
                            await new Promise(resolve => {
                                google.script.run.withSuccessHandler(resolve).withFailureHandler(resolve).saveNameOverride(reportName, rosterName);
                            });
                        }
                    }

                    // 2. Commit the data
                    // Map names in parsedRecords if they were just resolved
                    const finalRecords = parsedRecords.map(r => ({
                        ...r,
                        reportName: mappings[r.reportName] || r.reportName
                    }));

                    if (typeof google !== 'undefined' && google.script) {
                        google.script.run
                            .withSuccessHandler((msg) => {
                                setIsSaving(false);
                                setImportSummary(msg);
                                if (onImportComplete) onImportComplete();
                            })
                            .withFailureHandler((err) => {
                                setIsSaving(false);
                                showAlert("Error saving: " + err.message);
                            })
                            .saveImportedAttendance(finalRecords);
                    } else {
                        setTimeout(() => {
                            setIsSaving(false);
                            setImportSummary(`Success (Simulated): Processed ${finalRecords.length} records.`);
                        }, 1500);
                    }
                } catch (err) {
                    setIsSaving(false);
                    showAlert("Import Failed: " + err.message);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh] border border-white/20">
                        {/* HEADER */}
                        <div className="p-8 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-200">
                                    <UploadCloud size={24} />
                                </div>
                                <div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">Attendance Importer</h3>
                                    <div className="flex gap-4 mt-2">
                                        <button onClick={() => { setMode('file'); setParsedRecords([]); }} className={`text-[10px] font-bold uppercase tracking-widest pb-1 border-b-2 transition-all ${mode === 'file' ? 'text-indigo-600 border-indigo-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>Upload File</button>
                                        <button onClick={() => { setMode('paste'); setParsedRecords([]); }} className={`text-[10px] font-bold uppercase tracking-widest pb-1 border-b-2 transition-all ${mode === 'paste' ? 'text-indigo-600 border-indigo-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>Smart Paste</button>
                                    </div>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl transition-all text-slate-400"><XCircle size={24} /></button>
                        </div>

                        <div className="p-8 overflow-y-auto flex-1 custom-scrollbar space-y-8">
                            {!importSummary ? (
                                <>
                                    {isMappingMode ? (
                                        <div className="space-y-6 animate-fade-in">
                                            <div className="bg-amber-50 rounded-3xl p-6 border border-amber-100">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <AlertCircle className="text-amber-500" size={20} />
                                                    <h4 className="font-black text-amber-900 text-sm italic">Unresolved Resident Names</h4>
                                                </div>
                                                <p className="text-xs text-amber-700 leading-relaxed font-medium">
                                                    The system couldn't automatically match the following names from the report.
                                                    Please map them to the correct resident below to continue. This will create a permanent rule for future imports.
                                                </p>
                                            </div>

                                            <div className="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                                                <table className="w-full text-left">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                                            <th className="px-6 py-4">Name in Report</th>
                                                            <th className="px-6 py-4">Map to Roster</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {unresolvedNames.map((name, idx) => (
                                                            <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                                <td className="px-6 py-4 text-xs font-black text-slate-700">{name}</td>
                                                                <td className="px-6 py-4">
                                                                    <select
                                                                        value={mappings[name] || ""}
                                                                        onChange={(e) => setMappings({ ...mappings, [name]: e.target.value })}
                                                                        className="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all shadow-sm"
                                                                    >
                                                                        <option value="">-- Choose Resident --</option>
                                                                        {roster && roster.sort((a, b) => a.name.localeCompare(b.name)).map(r => (
                                                                            <option key={r.email} value={r.name}>{r.name}</option>
                                                                        ))}
                                                                    </select>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>

                                            <div className="flex justify-end gap-3 pt-4">

                                                placeholder="Resident Name	03/25/2026	Topic Name..."
                                            ></textarea>
                                            <button
                                                onClick={parsePaste}

                                                        <Loader2 className="w-4 h-4 animate-spin" />

                                    {parsedRecords.length > 0 && (

                                                    Found {parsedRecords.length} Attendance Records
                                                </h4>
