        // --- BLOCK DETAIL MODAL COMPONENT ---
        const BlockDetailModal = ({ isOpen, onClose, blockData, statsData, roster }) => {
            if (!isOpen || !blockData) return null;

            const { useState } = React;
            const [localSearch, setLocalSearch] = useState('');

            // Helper to check timeliness
            const getTimelineStatus = (attempt, block) => {
                if (!attempt || !block || !block.startDate || !block.endDate) return null;
                const bs = new Date(block.startDate + 'T00:00:00');
                const be = new Date(block.endDate + 'T23:59:59');
                const ad = new Date(attempt.date);
                if (isNaN(ad.getTime())) return null;
                if (ad < bs) return 'EARLY';
                if (ad <= be) return 'ON_TIME';
                return 'LATE';
            };

            const completions = roster.map(res => {
                const stat = statsData.find(s => s.email === res.email) || {};
                const attempt = (stat.history || []).find(h => {
                    if (!h.topic || !blockData.quiz?.title) return false;
                    const hTopic = h.topic.toLowerCase();
                    const bTitle = blockData.quiz.title.toLowerCase();
                    return hTopic.includes(bTitle) || bTitle.includes(hTopic);
                });
                const timelineStatus = getTimelineStatus(attempt, blockData.schedBlock);

                return {
                    ...res,
                    completed: !!attempt,
                    score: attempt ? attempt.percentage : null,
                    date: attempt ? attempt.date : null,
                    timelineStatus
                };
            }).filter(r => r.name.toLowerCase().includes(localSearch.toLowerCase()));

            const doneCount = completions.filter(c => c.completed).length;
            const avgScore = completions.filter(c => c.completed && c.score !== null).reduce((acc, curr) => acc + curr.score, 0) / (doneCount || 1);

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col max-h-[90vh] border border-white/20">
                        {/* Header */}
                        <div className="p-8 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-200">
                                    <BarChart2 size={24} />
                                </div>
                                <div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">{blockData.quiz?.title}</h3>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">
                                        {blockData.schedBlock?.startDate && blockData.schedBlock?.endDate
                                            ? `Block Dates: ${blockData.schedBlock.startDate} to ${blockData.schedBlock.endDate}`
                                            : 'Detailed Completion Breakdown'}
                                    </p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl transition-all text-slate-400"><X size={24} /></button>
                        </div>

                        {/* Stats Row */}
                        <div className="p-6 bg-indigo-50/30 border-b border-indigo-100 flex flex-wrap gap-8 items-center justify-center">
                            <div className="text-center">
                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Engagement</p>
                                <p className="text-2xl font-black text-indigo-900">{Math.round((doneCount / roster.length) * 100)}%</p>
                                <p className="text-[10px] text-indigo-500 font-bold">{doneCount} / {roster.length} Residents</p>
                            </div>
                            <div className="w-px h-10 bg-indigo-100 hidden sm:block"></div>
                            <div className="text-center">
                                <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Avg Score</p>
                                <p className="text-2xl font-black text-emerald-600">{Math.round(avgScore)}%</p>
                            </div>
                            <div className="flex-1 min-w-[300px] max-w-md relative group">
                                <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                                <input
                                    type="text"
                                    placeholder="Find resident..."
                                    value={localSearch}
                                    onChange={(e) => setLocalSearch(e.target.value)}
                                    className="w-full pl-10 pr-4 py-3 bg-white border border-indigo-100 rounded-2xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm"
                                />
                            </div>
                        </div>

                        {/* List Area */}
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {completions.map((res, i) => (
                                    <div key={i} className={`p-4 rounded-2xl border transition-all ${res.completed ? 'bg-white border-slate-100 shadow-sm' : 'bg-slate-50 border-slate-50 opacity-60'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <p className="font-bold text-slate-800 text-sm whitespace-nowrap truncate max-w-[150px]">{res.name}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{res.computedPgy || res.pgy}</p>
                                            </div>
                                            {res.completed ? (
                                                <div className="text-right">
                                                    <span className={`text-sm font-black ${res.score >= 70 ? 'text-green-600' : res.score >= 60 ? 'text-yellow-600' : 'text-red-600'}`}>
                                                        {res.score}%
                                                    </span>
                                                </div>
                                            ) : (
                                                <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest bg-slate-200/50 px-2 py-1 rounded-lg">Pending</span>
                                            )}
                                        </div>

                                        <div className="flex items-center justify-between mt-4 sm:mt-6">
                                            {res.completed ? (
                                                <>
                                                    <div className="flex flex-col">
                                                        <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Completed</span>
                                                        <span className="text-[10px] font-bold text-slate-600">{res.date}</span>
                                                    </div>
                                                    <div className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${res.timelineStatus === 'EARLY' ? 'bg-amber-100 text-amber-700 border border-amber-300' :
                                                            res.timelineStatus === 'ON_TIME' ? 'bg-emerald-100 text-emerald-700 border border-emerald-300' :
                                                                'bg-red-100 text-red-700 border border-red-300'
                                                        }`}>
                                                        {res.timelineStatus === 'EARLY' ? <Star size={10} /> : res.timelineStatus === 'ON_TIME' ? <Check size={10} /> : <AlertTriangle size={10} />}
                                                        {res.timelineStatus === 'EARLY' ? 'Early' : res.timelineStatus === 'ON_TIME' ? 'On Time' : 'Late'}
                                                    </div>
                                                </>
                                            ) : (
                                                <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden opacity-30">
                                                    <div className="bg-slate-400 h-full w-0"></div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- ADMIN BLOCK BUILDER (PHASE 3) ---
        const AdminBlockBuilderScreen = ({ onSaveQuizzes, quizzes, showAlert }) => {
            const { useState, useEffect } = React;
            const [filters, setFilters] = useState({ years: [], categories: [], total: 0 });
            const [isLoadingFilters, setIsLoadingFilters] = useState(true);
            const [bKeyword, setBKeyword] = useState('');
            const [bYears, setBYears] = useState([]);
            const [bCats, setBCats] = useState([]);
            const [results, setResults] = useState([]);
            const [selectedQs, setSelectedQs] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [blockTitle, setBlockTitle] = useState('');
            const [showSaveModal, setShowSaveModal] = useState(false);

            useEffect(() => {
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler(f => { setFilters(f || { years: [], categories: [] }); setIsLoadingFilters(false); })
                        .withFailureHandler(() => setIsLoadingFilters(false))
                        .getBankFilters();
                } else {
                    setFilters({ years: ["2023", "2024", "2025"], categories: ABFM_CATEGORIES, total: 100 });
                    setIsLoadingFilters(false);
                }
            }, []);

            const toggleY = y => setBYears(p => p.includes(y) ? p.filter(i => i !== y) : [...p, y]);
            const toggleC = c => setBCats(p => p.includes(c) ? p.filter(i => i !== c) : [...p, c]);

            const handleSearch = () => {
                setIsSearching(true);
                const filtersObj = JSON.stringify({ years: bYears, categories: bCats });
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run.withSuccessHandler((res) => {
                        setIsSearching(false);
                        if (res.error) showAlert(res.error);
                        else setResults(res.results || []);
                    }).withFailureHandler((err) => {
                        setIsSearching(false);
                        showAlert("Search failed: " + err);
                    }).adminSearchBank(bKeyword, filtersObj);
                } else {
                    setTimeout(() => {
                        setIsSearching(false);
                        setResults([
                            { year: "2023", category: "Cardiology", question: "Test Q 1 - Heart Failure", correct: 0, options: ["A", "B", "C", "D"], explanation: "Explain 1" },
                            { year: "2024", category: "Pulmonary", question: "Test Q 2 - Asthma", correct: 1, options: ["X", "Y", "Z", "W"], explanation: "Explain 2" }
                        ]);
                    }, 500);
                }
            };

            const toggleQuestion = (idx, q) => {
                const found = selectedQs.findIndex(item => item.idx === idx);
                if (found > -1) {
                    const next = [...selectedQs];
                    next.splice(found, 1);
                    setSelectedQs(next);
                } else {
                    setSelectedQs([...selectedQs, { idx, ...q }]);
                }
            };

            const handleSave = () => {
                if (!blockTitle) return showAlert("Please provide a block title.");
                const newQuiz = {
                    id: 'custom-' + new Date().getTime(),
                    title: blockTitle,
                    description: 'Admin assigned block created on ' + new Date().toLocaleDateString(),
                    questions: selectedQs.map(q => ({
                        category: q.category,
                        year: q.year,
                        question: q.question,
                        correct: q.correct,
                        explanation: q.explanation,
                        resource: q.resource,
                        options: q.options
                    })),
                    questionCount: selectedQs.length
                };
                onSaveQuizzes([...quizzes, newQuiz]);
                setSelectedQs([]);
                setResults([]);
                setBKeyword('');
                setBlockTitle('');
                setShowSaveModal(false);
                showAlert("Block created! Remember to go to the Content tab and Push Changes to Sheet.");
            };

            return (
                <div className="w-full animate-fade-in pb-12 flex flex-col md:flex-row gap-6">
                    {/* Left Panel: Search Filters */}
                    <div className="w-full md:w-80 flex flex-col gap-6 shrink-0">
                        <div className="glass-panel p-6 rounded-[2rem] border border-white/50 premium-shadow">
                            <h3 className="font-black text-slate-800 text-lg mb-4 flex items-center gap-2">
                                <Search className="w-5 h-5 text-blue-500" /> Search Filters
                                {isLoadingFilters && <RefreshCw className="w-4 h-4 animate-spin text-slate-400 ml-auto" />}
                            </h3>
                            <div className="space-y-5">
                                <div>
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1 block">Keyword</label>
                                    <input
                                        type="text"
                                        placeholder="Heart, Asthma, etc."
                                        value={bKeyword}
                                        onChange={e => setBKeyword(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
                                    />
                                    <p className="text-[9px] font-bold text-slate-400 mt-1">Searches questions, explanations &amp; topics</p>
                                </div>
                                <div className="border-t border-slate-100 pt-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">ITE Year</label>
                                        <button onClick={() => setBYears([])} className="text-[9px] text-blue-600 hover:text-blue-800 font-bold">Clear</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto">
                                        {filters.years.map(y => (
                                            <button key={y} onClick={() => toggleY(y)} className={`px-2 py-1 text-[10px] font-black rounded-lg transition-all ${bYears.includes(y) ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{y}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="border-t border-slate-100 pt-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">ABFM Category</label>
                                        <button onClick={() => setBCats([])} className="text-[9px] text-blue-600 hover:text-blue-800 font-bold">Clear</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                                        {filters.categories.map(c => (
                                            <button key={c} onClick={() => toggleC(c)} className={`px-2 py-1 text-[10px] font-black rounded-lg transition-all text-left ${bCats.includes(c) ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={handleSearch} disabled={isSearching} className="w-full p-4 mt-2 bg-indigo-600 text-white rounded-xl font-black uppercase tracking-widest text-xs hover:bg-indigo-700 transition shadow-lg flex justify-center gap-2">
                                    {isSearching ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Search className="w-4 h-4" />}
                                    Search Bank
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Right Panel: Results & Staging */}
                    <div className="flex-1 flex flex-col gap-6">
                        {/* Staging Summary */}
                        <div className="glass-panel p-5 rounded-[2rem] border border-white/50 premium-shadow flex justify-between items-center bg-slate-50/50">
                            <div>
                                <h4 className="font-black text-slate-800 text-xl tracking-tight">Block Staging <span className="text-sm font-bold text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm ml-2">{selectedQs.length} Selected</span></h4>
                            </div>
                            <button onClick={() => setShowSaveModal(true)} disabled={selectedQs.length === 0} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-black uppercase tracking-widest text-xs hover:bg-blue-700 disabled:opacity-50 disabled:grayscale transition shadow-lg flex gap-2 items-center">
                                <PlusCircle className="w-4 h-4" /> Create Block
                            </button>
                        </div>

                        {/* Search Results */}
                        <div className="glass-panel rounded-[2rem] border border-white/50 premium-shadow overflow-hidden flex flex-col h-[600px]">
                            <div className="bg-slate-100/50 p-4 border-b border-slate-200 text-xs font-black uppercase tracking-widest text-slate-500 flex justify-between">

                if (!pgyString) return "Unknown";
                const match = pgyString.match(/Class of (\d{4})/i);

                const gradYear = parseInt(match[1]);
                const today = new Date();
                let currentAcademicYearEnd = today.getFullYear();

                // Academic year ends in June; if we are July or later, graduation is next year
                if (today.getMonth() >= 6) currentAcademicYearEnd += 1;

                const yearsUntilGraduation = gradYear - currentAcademicYearEnd;

                if (yearsUntilGraduation === 0) return "PGY-3";
                if (yearsUntilGraduation === 1) return "PGY-2";
                if (yearsUntilGraduation === 2) return "PGY-1";
                if (yearsUntilGraduation < 0) return "Alumni";
                return "Incoming";

                    let currentIdx = sortedSchedule.findIndex(b => {
                        const start = new Date(b.startDate + 'T00:00:00');
                        const end = new Date(b.endDate + 'T23:59:59');
                        return today >= start && today <= end;
                    });

                    // If between blocks, find the next one
                    if (currentIdx === -1) {
                        currentIdx = sortedSchedule.findIndex(b => new Date(b.startDate + 'T00:00:00') > today);
                    }

                    const titlesToFind = [];
                    if (currentIdx === -1) {
                        // All blocks are in the past
                        const last = sortedSchedule[sortedSchedule.length - 1];
                        if (last) titlesToFind.push(last.title);
                    } else {
                        if (currentIdx > 0) titlesToFind.push(sortedSchedule[currentIdx - 1].title); // Past
                        titlesToFind.push(sortedSchedule[currentIdx].title); // Current
                        if (currentIdx < sortedSchedule.length - 1) titlesToFind.push(sortedSchedule[currentIdx + 1].title); // Next
                    }

                        .filter(q => titlesToFind.some(t => q.title.toLowerCase().includes(t.toLowerCase()) || t.toLowerCase().includes(q.title.toLowerCase())))

        const HighlightableText = ({ text, mode, className, isBold }) => {
            const containerRef = useRef(null);
            const [spans, setSpans] = useState([{ text: text, highlight: false }]);

            useEffect(() => { setSpans([{ text: text, highlight: false }]); }, [text]);

            const handleMouseUp = () => {
                if (!mode) return;
                const selection = window.getSelection();
                if (!selection.rangeCount || selection.isCollapsed) return;
                const range = selection.getRangeAt(0);
                if (!containerRef.current.contains(range.commonAncestorContainer)) return;
                const selectedText = selection.toString();

                setSpans(prevSpans => {
                    const newSpans = [];
                    let found = false;
                    for (const span of prevSpans) {
                        if (found || span.highlight) { newSpans.push(span); continue; }
                        const idx = span.text.indexOf(selectedText);
                        if (idx !== -1) {
                            const before = span.text.substring(0, idx);
                            const after = span.text.substring(idx + selectedText.length);
                            if (before) newSpans.push({ text: before, highlight: false });
                            newSpans.push({ text: selectedText, highlight: true });
                            if (after) newSpans.push({ text: after, highlight: false });
                            found = true;
                        } else { newSpans.push(span); }
                    }
                    return newSpans;
                });
                selection.removeAllRanges();
            };

            return (
                <h2 ref={containerRef} onMouseUp={handleMouseUp} className={`${className} ${isBold ? 'font-bold' : 'font-medium'} cursor-text`}>
                    {spans.map((s, i) => (
                        <span key={i} className={s.highlight ? "bg-yellow-200 rounded px-0.5 cursor-pointer hover:bg-yellow-300 transition-colors" : ""} onClick={() => { if (s.highlight) setSpans(prev => { const copy = [...prev]; copy[i] = { text: s.text, highlight: false }; return copy; }); }}>{s.text}</span>
                    ))}
                </h2>
            );
        };

                    const emailKey = getEmailKey();
                    const savedRandomData = localStorage.getItem(`fmc_random_quiz_data_${emailKey}`);
                    const savedRandomProg = localStorage.getItem(`fmc_random_quiz_progress_${emailKey}`);
                    if (savedRandomData && savedRandomProg) {
                        setHasSavedRandom(true);
                        const p = JSON.parse(savedRandomProg);
                        setSavedRandomInfo(`Resuming at Question ${p.q + 1}`);
                    } else {
                        setHasSavedRandom(false);
                    }
                }
            }, [view, residentEmail]);

            useLayoutEffect(() => {
                if (view === 'quiz' && quizScrollRef.current) quizScrollRef.current.scrollTop = 0;
            }, [currentQuestion, view]);

            useEffect(() => {
                if (view === 'quiz' && activeQuizData && residentEmail) {
                    const emailKey = getEmailKey();
                    const stateToSave = { q: currentQuestion, a: userAnswers, s: score, ts: Date.now() };
                    if (activeQuizData.id.startsWith('random-') || activeQuizData.id.startsWith('custom-')) {
                        localStorage.setItem(`fmc_random_quiz_data_${emailKey}`, JSON.stringify(activeQuizData));
                        localStorage.setItem(`fmc_random_quiz_progress_${emailKey}`, JSON.stringify(stateToSave));
                    } else {
                        const saveKey = `fmc_progress_${emailKey}_${activeQuizData.id}`;
                        localStorage.setItem(saveKey, JSON.stringify(stateToSave));
                    }
                }
            }, [currentQuestion, userAnswers, score, view, activeQuizData, residentEmail]);

            const getSavedProgress = (quizId) => {
                if (!residentEmail) return null;
                try {
                    const emailKey = getEmailKey();
                    const saved = localStorage.getItem(`fmc_progress_${emailKey}_${quizId}`);
                    return saved ? JSON.parse(saved) : null;
                } catch (e) { return null; }
            };

            const clearSavedProgress = (quizId) => {
                if (!residentEmail) return;
                const emailKey = getEmailKey();
                if (quizId && (quizId.startsWith('random-') || quizId.startsWith('custom-'))) {
                    localStorage.removeItem(`fmc_random_quiz_data_${emailKey}`);
                    localStorage.removeItem(`fmc_random_quiz_progress_${emailKey}`);
                } else {
                    localStorage.removeItem(`fmc_progress_${emailKey}_${quizId}`);
                }
            };

            const handleStartQuiz = (quizId) => {
                setIsLoadingQuiz(true);
                setStruckOptions([]);

                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler((fullQuizData) => {
                            if (!fullQuizData) {
                                setIsLoadingQuiz(false);
                                showAlert("Error loading quiz data. Please check the sheet.");
                                return;
                            }

                            const saved = getSavedProgress(quizId);
                            setActiveQuizData(fullQuizData);

                            if (saved) {
                                showConfirm(`You have an unfinished attempt for this block (Question ${saved.q + 1}). Resume?`, () => {
                                    setCurrentQuestion(saved.q);
                                    setUserAnswers(saved.a);
                                    setScore(saved.s);
                                    setView('quiz');
                                    setIsLoadingQuiz(false);
                                });
                            } else {
                                setCurrentQuestion(0);
                                setUserAnswers({});
                                setScore(0);
                                setView('quiz');
                                setIsLoadingQuiz(false);
                            }
                        })
                        .withFailureHandler((e) => {
                            setIsLoadingQuiz(false);
                            showAlert("Failed to load: " + e);
                        })
                        .getQuizContent(quizId);
                } else {
                    // CANVAS PREVIEW FALLBACK
                    setTimeout(() => {
                        setActiveQuizData({
                            id: quizId,
                            title: "Mock Fixed Block",
                            questions: [
                                { category: "Emergency", question: "This is a mock question for preview purposes. What is 2 + 2?", options: ["2", "3", "4", "5"], correct: 2, explanation: "Basic math.", resource: "Google" }
                            ]
                        });
                        setCurrentQuestion(0);
                        setUserAnswers({});
                        setScore(0);
                        setView('quiz');
                        setIsLoadingQuiz(false);
                    }, 500);
                }
            };

            const handleRandomQuiz = () => {
                const startNew = () => {
                    setIsLoadingQuiz(true);
                    setStruckOptions([]);
                    if (typeof google !== 'undefined' && google.script) {
                        google.script.run
                            .withSuccessHandler((quiz) => {
                                if (!quiz || !quiz.questions || quiz.questions.length === 0) {
                                    setIsLoadingQuiz(false);
                                    showAlert("Not enough questions in fixed blocks to generate a quiz.");
                                    return;
                                }
                                setActiveQuizData(quiz);
                                setCurrentQuestion(0);
                                setUserAnswers({});
                                setScore(0);
                                setView('quiz');
                                setIsLoadingQuiz(false);
                            })
                            .generateRandomMixedBlock(40);
                    } else {
                        // CANVAS PREVIEW FALLBACK
                        setTimeout(() => {
                            setActiveQuizData({
                                id: 'random-123',
                                title: "Mock Random Review",
                                questions: [
                                    { category: "General", question: "Mock random question?", options: ["A", "B", "C", "D"], correct: 0, explanation: "Yes.", resource: "" }
                                ]
                            });
                            setCurrentQuestion(0);
                            setUserAnswers({});
                            setScore(0);
                            setView('quiz');
                            setIsLoadingQuiz(false);
                        }, 500);
                    }
                };
                if (hasSavedRandom) showConfirm("You have a saved custom/mixed review in progress. Starting a new one will erase it. Continue?", startNew);
                else showConfirm("Generate a random 40-question block from Fixed Topics?", startNew);
            };

            const handleOpenBuilder = () => {
                setIsLoadingQuiz(true);
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler((filters) => {
                            setBankFilters(filters);
                            setIsLoadingQuiz(false);
                            setView('custom-builder');
                        })
                        .getBankFilters();
                } else {
                    setBankFilters({ years: ["2023", "2024"], categories: ["Cardio", "Pulm"], total: 100 });
                    setIsLoadingQuiz(false);
                    setView('custom-builder');
                }
            };

            const handleStartCustomQuiz = (config) => {
                setIsLoadingQuiz(true);
                setStruckOptions([]);
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler((quiz) => {
                            setIsLoadingQuiz(false);
                            if (quiz && quiz.error) {
                                showAlert(quiz.error);
                                return;
                            }
                            if (!quiz || !quiz.questions || quiz.questions.length === 0) {
                                showAlert("No questions matched your filters.");
                                return;
                            }
                            setActiveQuizData(quiz);
                            setCurrentQuestion(0);
                            setUserAnswers({});
                            setScore(0);
                            setView('quiz');
                        })
                        .withFailureHandler((e) => {
                            setIsLoadingQuiz(false);
                            showAlert("Failed to generate custom quiz: " + e);
                        })
                        .generateCustomQuiz(JSON.stringify(config));
                } else {
                    // CANVAS PREVIEW FALLBACK
                    setTimeout(() => {
                        setActiveQuizData({
                            id: 'custom-123',
                            title: "Mock Custom Block",
                            questions: [
                                { category: "Cardio", question: "Mock custom question based on filters?", options: ["A", "B", "C", "D"], correct: 1, explanation: "Yes.", resource: "" }
                            ]
                        });
                        setCurrentQuestion(0);
                        setUserAnswers({});
                        setScore(0);
                        setView('quiz');
                        setIsLoadingQuiz(false);
                    }, 500);
                }
            };

            const handleResumeRandom = () => {
                try {
                    const emailKey = getEmailKey();
                    const data = JSON.parse(localStorage.getItem(`fmc_random_quiz_data_${emailKey}`));
                    const prog = JSON.parse(localStorage.getItem(`fmc_random_quiz_progress_${emailKey}`));
                    if (data && prog) {
                        setActiveQuizData(data);
                        setCurrentQuestion(prog.q);
                        setUserAnswers(prog.a);
                        setScore(prog.s);
                        setStruckOptions([]);
                        setView('quiz');
                    } else {
                        showAlert("Error resuming saved quiz.");
                        setHasSavedRandom(false);
                    }
                } catch (e) { console.error(e); }
            };

            const handleOpenMyStats = () => {
                setIsLoadingProfile(true);
                setShowMyStatsModal(true);
                // Ensure we have block schedule data for badges/streaks
                if (blockScheduleData.length === 0 && typeof google !== 'undefined' && google.script) {
                    google.script.run.withSuccessHandler(setBlockScheduleData).getBlockSchedule();
                }
                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler((data) => {
                            setMyProfileData(data);
                            setIsLoadingProfile(false);
                        })
                        .withFailureHandler((error) => {
                            setMyProfileData({ error: (error && error.message) ? error.message : String(error) });
                            setIsLoadingProfile(false);
                        })
                        .getResidentProfile(residentEmail);
                } else {
                    setTimeout(() => {
                        setMyProfileData({ totalPoints: 15, brqPoints: 10, attPoints: 5, blocks: [{ date: "10/24/2024", topic: "Demo Block", score: "80%", points: 2 }], conferences: [{ date: "10/23/2024", topic: "Demo Conference", points: 1 }] });
                        setIsLoadingProfile(false);
                    }, 1000);
                }
            };

            const isEmailValid = residentEmail.toLowerCase().trim().endsWith('@ascension.org');
            const showEmailError = residentEmail.includes('@') && !isEmailValid;

            const question = activeQuizData?.questions[currentQuestion];
            const isSubmitted = userAnswers[currentQuestion]?.submitted;

            const openOpenEvidence = () => {
                if (!question) return;
                try { navigator.clipboard.writeText(question.question); } catch (e) { }
                window.open('https://www.openevidence.com/', '_blank');
            };

            const openDriveResource = () => {
                if (question.resource && question.resource.startsWith("http")) {
                    window.open(question.resource, '_blank');
                } else if (DRIVE_FOLDER_ID && question.category) {
                    const query = `parent:${DRIVE_FOLDER_ID} ${question.category}`;
                    const url = `https://drive.google.com/drive/u/0/search?q=${encodeURIComponent(query)}`;
                    window.open(url, '_blank');
                } else { showAlert("No specific resource linked for this topic."); }
            };

            const handleGemClick = () => {
                showConfirm(
                    "Warning: This tool uses AI which can make mistakes. Always verify responses with verified medical sources.\n\nClick below to proceed to the external Gem.",
                    () => window.open(BOARD_PREP_GEM_URL, '_blank'),
                    "AI Disclaimer",
                    "Continue to Gem"
                );
            };

            const handleFeedback = () => {
                const subject = encodeURIComponent("Question Feedback");
                const body = encodeURIComponent(`Ref: ${activeQuizData.title}\nQuestion: "${question.question}"\n\nComments: `);
                const mailtoLink = `mailto:${FEEDBACK_EMAIL}?subject=${subject}&body=${body}`;

                // Phase 2 Fix: Safe mailto launch bypassing iframe restrictions
                const link = document.createElement('a');
                link.href = mailtoLink;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleAnswerClick = (idx) => {
                if (isSubmitted) return;
                if (struckOptions.includes(idx)) return;
                setUserAnswers(prev => ({ ...prev, [currentQuestion]: { ...prev[currentQuestion], selected: idx } }));
            };

            const toggleStrike = (e, idx) => {
                e.stopPropagation();
                if (isSubmitted) return;
                if (userAnswers[currentQuestion]?.selected === idx) return;

                setStruckOptions(prev => {
                    if (prev.includes(idx)) return prev.filter(i => i !== idx);
                    return [...prev, idx];
                });
            };

            const handleSubmitAnswer = () => {
                const ans = userAnswers[currentQuestion];
                if (!ans || ans.selected === undefined) return;
                const isCorrect = ans.selected === question.correct;
                setUserAnswers(prev => ({ ...prev, [currentQuestion]: { ...prev[currentQuestion], submitted: true } }));
                if (isCorrect) setScore(s => s + 1);
            };

            const handleNext = () => {
                setHighlightMode(false);
                setStruckOptions([]);

                if (currentQuestion + 1 < activeQuizData.questions.length) {
                    setCurrentQuestion(c => c + 1);
                } else {
                    const categoryStats = {};
                    activeQuizData.questions.forEach((q, i) => {
                        const isCorrect = userAnswers[i] && userAnswers[i].selected === q.correct;

                        // Track System
                        if (q.system) {
                            if (!categoryStats[q.system]) categoryStats[q.system] = { correct: 0, total: 0 };
                            categoryStats[q.system].total += 1;
                            if (isCorrect) categoryStats[q.system].correct += 1;
                        }

                        // Track ABFM Category
                        if (q.abfmCategory) {
                            const catKey = "ABFM: " + q.abfmCategory;
                            if (!categoryStats[catKey]) categoryStats[catKey] = { correct: 0, total: 0 };
                            categoryStats[catKey].total += 1;
                            if (isCorrect) categoryStats[catKey].correct += 1;
                        }

                        // Track Difficulty
                        if (q.difficulty) {
                            const diffKey = "Level " + q.difficulty;
                            if (!categoryStats[diffKey]) categoryStats[diffKey] = { correct: 0, total: 0 };
                            categoryStats[diffKey].total += 1;
                            if (isCorrect) categoryStats[diffKey].correct += 1;
                        }

                        // Fallback
                        if (!q.system && !q.abfmCategory && !q.difficulty) {
                            const cat = q.category || "General";
                            if (!categoryStats[cat]) categoryStats[cat] = { correct: 0, total: 0 };
                            categoryStats[cat].total += 1;
                            if (isCorrect) categoryStats[cat].correct += 1;
                        }
                    });

                    const missed = activeQuizData.questions
                        .filter((q, i) => { const ans = userAnswers[i]; return !ans || ans.selected !== q.correct; })
                        .map(q => ({ category: q.category || "General", system: q.system, abfmCategory: q.abfmCategory, question: q.question, correctAnswer: q.options[q.correct], explanation: q.explanation || "No explanation provided.", resource: q.resource }));
                    setMissedQuestions(missed);

                    let logTitle = activeQuizData.title;
                    if (activeQuizData.id.startsWith('custom-')) logTitle = "Custom Block - " + new Date().toLocaleDateString();

                    setCompletedQuizzes(prev => [...prev, logTitle]);

                    if (typeof google !== 'undefined' && google.script) {
                        google.script.run.saveToSheet({
                            resident: residentName,
                            email: residentEmail,
                            topic: logTitle,
                            score,
                            total: activeQuizData.questions.length,
                            missed: missed,
                            categoryStats: categoryStats,
                            answers: activeQuizData.questions.map((q, i) => ({
                                resource: q.resource,
                                category: q.category,
                                difficulty: q.difficulty,
                                correct: userAnswers[i]?.selected === q.correct
                            }))
                        });

                        google.script.run.withSuccessHandler(setCommunityStats).getQuestionStats(activeQuizData.id);
                    }
                    clearSavedProgress(activeQuizData.id);

                    // --- Badge detection ---
                    try {
                        const storageKey = 'fmc_earned_badges_' + residentEmail.toLowerCase().trim();
                        const knownLabels = JSON.parse(localStorage.getItem(storageKey) || '[]');
                        // Compute current badges from updated totals (increment completed count)
                        const updatedRes = {
                            totalQuestionsCompleted: (myProfileData && myProfileData.totalQuestionsCompleted ? myProfileData.totalQuestionsCompleted : 0) + activeQuizData.questions.length,
                            history: myProfileData ? (myProfileData.history || []) : [],
                            academicPoints: (myProfileData && myProfileData.totalPoints ? myProfileData.totalPoints : 0) + 2,
                            customBlocksCompleted: activeQuizData.id && activeQuizData.id.startsWith('custom-') ? 1 : 0
                        };
                        const { badges: nowBadges } = computeStreakAndBadges(updatedRes, blockScheduleData, leaderboardData, null);
                        const newOnes = nowBadges.filter(b => !knownLabels.includes(b.label));
                        if (newOnes.length > 0) {
                            setBadgeCelebration(newOnes[0]);
                            localStorage.setItem(storageKey, JSON.stringify([...knownLabels, ...newOnes.map(b => b.label)]));
                        }
                    } catch (e) { /* badge detection is non-critical */ }

                    setView('score');
                }
            };

            const reset = () => { setView('topic-select'); setActiveQuizData(null); setCurrentQuestion(0); setUserAnswers({}); setScore(0); setMissedQuestions([]); setStruckOptions([]); };

            const handleAdminLogin = () => {
                setIsAdmin(true);
                setShowAdminModal(false);
                setAdminInput('');
                setView('admin');

                if (typeof google !== 'undefined' && google.script) {
                    showAlert("Loading fixed database and roster for Admin Mode...");
                    google.script.run.withSuccessHandler((fullData) => {
                        setQuizzes(fullData);
                    }).getQuizzesFromSheet();

                    google.script.run.withSuccessHandler(setRoster).getRoster();
                    google.script.run.withSuccessHandler(setBlockScheduleData).getBlockSchedule();
                }
            };

            return (
                <div className="min-h-[100dvh] bg-slate-50 flex items-stretch sm:items-center justify-center sm:p-6 font-sans text-slate-800">
                    {isLoadingQuiz && (
                        <div className="fixed inset-0 bg-black/30 z-[60] flex items-center justify-center backdrop-blur-sm animate-fade-in">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center">
                                <RefreshCw className="w-10 h-10 text-blue-600 animate-spin mb-4" />
                                <p className="font-bold text-slate-700">Loading Data...</p>
                            </div>
                        </div>
                    )}

                    <div className={`bg-white w-full max-h-[100dvh] transition-all duration-300 shadow-2xl flex flex-col border border-slate-200 relative ${view === 'login' ? 'rounded-none sm:rounded-3xl sm:max-w-sm' : 'rounded-3xl'} ${view === 'topic-select' || view === 'quiz' || view === 'score' ? 'max-w-5xl min-h-[600px]' : ''} ${view === 'custom-builder' ? 'max-w-3xl min-h-[600px]' : ''} ${view === 'import' ? 'max-w-2xl min-h-[600px]' : ''} ${highlightMode ? 'highlight-active cursor-text' : ''}`}>

                        {view === 'login' && (
                            <div className="flex flex-col flex-1 px-8 pt-14 pb-8 sm:px-10 sm:pt-12 sm:pb-8 animate-fade-in relative overflow-y-auto custom-scrollbar min-h-0">
                                <button onClick={() => setShowAdminModal(true)} className={`absolute top-5 right-5 p-2 rounded-full transition-colors z-20 ${isAdmin ? 'text-green-600 bg-green-50' : 'text-slate-300 hover:text-slate-500'}`} title="Admin Login">{isAdmin ? <Unlock className="w-5 h-5" /> : <Lock className="w-5 h-5" />}</button>

                                {/* Branding */}
                                <div className="flex flex-col items-center text-center mb-8">
                                    <div className="bg-blue-600 p-5 rounded-3xl shadow-xl text-white mb-5"><BookOpen className="w-12 h-12" /></div>
                                    <h1 className="text-3xl font-black text-slate-900 leading-tight">FMC Board Question App</h1>
                                    <p className="text-slate-400 text-xs mt-2 leading-snug">Ascension St. Vincent's Family Medicine Residency Program Jacksonville</p>
                                </div>

                                {/* Form - flex-1 so it fills space on tall screens */}
                                <div className="flex flex-col gap-3 flex-1 justify-center">
                                    <input type="text" placeholder="Full Name" value={residentName} onChange={e => setResidentName(e.target.value)} className="w-full px-4 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 text-base" />
                                    <div>
                                        <input type="email" placeholder="Email Address" value={residentEmail} onChange={e => setResidentEmail(e.target.value)} className={`w-full px-4 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 transition-all text-base ${showEmailError ? 'border-2 border-red-500 focus:ring-red-200' : 'focus:ring-blue-500'}`} />
                                        {showEmailError && (<div className="flex items-center gap-1 mt-2 text-red-600 text-xs font-bold animate-fade-in"><XCircle className="w-4 h-4" /> Please use your @ascension.org email</div>)}
                                    </div>
                                    <button onClick={() => { if (residentName && isEmailValid) { setResidentEmail(prev => prev.trim()); setView('topic-select'); } }} disabled={!residentName || !isEmailValid} className="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-base mt-1">Start</button>
                                </div>

                                {/* Bottom: disclaimer + changelog */}
                                <div className="mt-8 flex items-center justify-center gap-6">
                                    <button onClick={() => setShowDisclaimerModal(true)} className="flex items-center gap-1.5 text-amber-600/80 hover:text-amber-600 transition-colors text-xs font-bold py-1">
                                        <Info className="w-3.5 h-3.5" /> AI Disclaimer
                                    </button>
                                    <button onClick={() => setShowChangelogModal(true)} className="flex items-center gap-1.5 text-slate-400 hover:text-blue-500 transition-colors text-xs font-bold py-1">
                                        <HelpCircle className="w-3.5 h-3.5" /> What's New
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="fixed inset-0 bg-slate-50 z-50 overflow-y-auto">
                                <AdminDashboard
                                    onBack={() => setView('login')}
                                    onImportClick={() => setView('import')}
                                    onDeleteQuiz={(id) => {
                                        setQuizzes(quizzes.filter(q => q.id !== id));
                                        if (typeof google !== 'undefined' && google.script) google.script.run.deleteQuizFromSheet(id);
                                    }}
                                    onEditTitle={(quiz, t) => setQuizzes(quizzes.map(q => q.id === quiz.id ? { ...q, title: t } : q))}
                                    onReorder={setQuizzes}
                                    quizzes={quizzes}
                                    roster={roster}
                                    showAlert={showAlert}
                                    showConfirm={showConfirm}
                                    blockScheduleData={blockScheduleData}
                                    setBlockScheduleData={setBlockScheduleData}
                                    sheetUrl={sheetUrl}
                                />
                            </div>
                        )}

                        {view === 'import' && (
                            <ImportScreen
                                onSaveFixed={(q) => { setQuizzes([...quizzes, q]); setView('admin'); }}
                                onSaveBank={() => { setView('admin'); }}
                                onCancel={() => setView('admin')}
                                showAlert={showAlert}
                            />
                        )}

                        {view === 'custom-builder' && (
                            <CustomBuilderScreen
                                onStart={handleStartCustomQuiz}
                                onCancel={() => setView('topic-select')}
                                filters={bankFilters}
                            />
                        )}

                        {view === 'topic-select' && (
                            <div className="p-6 md:p-8 animate-fade-in flex flex-col flex-1 min-h-0 overflow-y-auto">

                                {/* Header row - full width */}
                                <div className="mb-8 flex justify-between items-start relative">
                                    <div className="absolute -top-10 -left-10 w-64 h-64 bg-blue-100/30 rounded-full blur-3xl pointer-events-none"></div>
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-black text-slate-900 tracking-tight">Noon Conference Blocks</h2>
                                        <p className="text-slate-500 font-bold text-sm tracking-wide mt-1 uppercase opacity-60">Ascension St. Vincent's FM Residency</p>
                                    </div>
                                    <div className="flex items-center gap-2 sm:gap-3 relative z-20">
                                        <button onClick={() => setShowAdminModal(true)} className="p-2 rounded-xl transition-colors" title="Admin Panel">{isAdmin ? <Unlock className="w-5 h-5" /> : <Lock className="w-5 h-5" />}</button>
                                        <button onClick={() => setView('login')} className="p-2 text-slate-400 hover:bg-red-50 hover:text-red-500 rounded-xl transition-colors" title="Log Out">
                                            <LogOut className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>

                                {/* Two-column layout for desktop */}
                                <div className="flex flex-col md:flex-row gap-6 flex-1 min-h-0">

                                    {/* LEFT SIDEBAR: Performance + Leaderboard */}
                                    <div className="md:w-80 flex flex-col gap-4 shrink-0 min-h-0 overflow-y-auto custom-scrollbar pr-1 pb-4">
                                        <button onClick={handleOpenMyStats} className="w-full flex items-center gap-4 p-5 btn-gradient-yellow border border-yellow-200 text-yellow-800 rounded-3xl hover-lift shadow-sm group">
                                            <div className="p-3 bg-white/60 rounded-2xl group-hover:scale-110 transition-transform">
                                                <Trophy className="w-6 h-6 text-yellow-500" />
                                            </div>
                                            <div className="text-left">
                                                <p className="font-bold text-base">My Performance</p>
                                                <p className="text-xs text-yellow-600">Stats, badges &amp; history</p>
                                            </div>
                                        </button>
                                        {leaderboardData && <LeaderboardWidget data={leaderboardData} />}
                                        {hasSavedRandom && (
                                            <button onClick={handleResumeRandom} className="w-full p-4 bg-amber-50 text-amber-800 border border-amber-200 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center gap-3">
                                                <PlayCircle className="w-6 h-6 shrink-0" />
                                                <div className="text-left">
                                                    <p className="font-bold">Resume Saved Review</p>
                                                    <p className="text-xs text-amber-600 opacity-80">{savedRandomInfo ? savedRandomInfo : "Continue your previous block"}</p>
