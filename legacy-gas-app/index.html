                                                            </div>
                                                            <div className="p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                                                <div className="flex flex-wrap items-center justify-between gap-4 mb-3">
                                                                    <div className="flex items-center gap-4">
                                                                        <div className="text-center"><p className="text-xl font-black text-orange-500 flex items-center justify-center gap-1"><Zap className="w-4 h-4" /> {blockStreak}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Block Streak</p></div>
                                                                        <div className="w-px h-8 bg-slate-200"></div>
                                                                        <div className="text-center"><p className="text-xl font-black text-indigo-600">{`Lvl ${milestone}`}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Milestone</p></div>
                                                                        <div className="w-px h-8 bg-slate-200"></div>
                                                                        <div className="text-center"><p className="text-xl font-black text-slate-700">{badges.length}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Badges Earned</p></div>
                                                                        {qotdProfile && qotdProfile.streak > 0 && (
                                                                            <>
                                                                                <div className="w-px h-8 bg-slate-200"></div>
                                                                                <div className="text-center"><p className="text-xl font-black text-amber-500 flex items-center justify-center gap-1"><Star className="w-4 h-4" /> {qotdProfile.streak}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">QOTD Streak</p></div>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                {badges.length === 0 ? <p className="text-xs text-slate-400 italic text-center py-2">Complete your first 40 questions to earn badges!</p> : <div className="flex flex-wrap gap-2">{badges.map((b, i) => { const IconComp = { Zap, Award, TrendingUp, Activity, BookOpen, Star, Sliders, Trophy, Clock, Calendar }[b.icon] || Star; return (<div key={i} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-full" title={b.desc}><IconComp className={`w-3.5 h-3.5 ${b.color}`} /><span className="text-xs font-bold text-slate-700">{b.label}</span></div>); })}</div>}
                                                            </div>
                                                        </div>
                                                    );
                                                })()}

                                                {(() => {
                                                    const chartHistory = (myProfileData.blocks && Array.isArray(myProfileData.blocks)) ? myProfileData.blocks.slice().reverse() : []; // Reverse to oldest-first for line chart
                                                    const chartTopics = (myProfileData.topicAverages && Array.isArray(myProfileData.topicAverages))
                                                        ? myProfileData.topicAverages
                                                            .map(t => ({ ...t, topic: ABFM_CATEGORIES.find(c => c.toLowerCase() === t.topic.toLowerCase()) || t.topic }))
                                                            .filter(t => ABFM_CATEGORIES.includes(t.topic))
                                                        : [];
                                                    const hasDetailedData = chartHistory.length > 0 || chartTopics.length > 0;

                                                    let weakest = null;
                                                    if (myProfileData.categoryStats && Object.keys(myProfileData.categoryStats).length > 0) {
                                                        let lowestScore = 101;
                                                        for (const [category, stats] of Object.entries(myProfileData.categoryStats || {})) {
                                                            const canonical = ABFM_CATEGORIES.find(c => c.toLowerCase() === category.toLowerCase());
                                                            if (stats && stats.total >= 3 && canonical) {
                                                                const score = (stats.correct / stats.total) * 100;
                                                                if (score < lowestScore) {
                                                                    lowestScore = score;
                                                                    weakest = { category, score: Math.round(score) };
                                                                }
                                                            }
                                                        }
                                                        if (!weakest) {
                                                            for (const [category, stats] of Object.entries(myProfileData.categoryStats || {})) {
                                                                const canonical = ABFM_CATEGORIES.find(c => c.toLowerCase() === category.toLowerCase());
                                                                if (stats && stats.total > 0 && canonical) {
                                                                    const score = (stats.correct / stats.total) * 100;
                                                                    if (score < lowestScore) {
                                                                        lowestScore = score;
                                                                        weakest = { category, score: Math.round(score) };
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    }

                                                    return (
                                                        <>
                                                            {weakest && (
                                                                <div className="bg-orange-50 p-4 rounded-xl border border-orange-200 mb-6">
                                                                    <h3 className="font-bold text-orange-800 mb-1 flex items-center gap-2"><AlertTriangle className="w-4 h-4" /> Study Focus Area</h3>
                                                                    <p className="text-sm text-orange-700">Your weakest category is <strong>{weakest.category}</strong> ({weakest.score}% correct). Consider reviewing this topic!</p>
                                                                </div>
                                                            )}

                                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                                                {/* Line Chart: Over Time */}
                                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                                                    <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center gap-2"><TrendingUp className="w-4 h-4 text-blue-500" /> Performance Over Time</h3>
                                                                    <div className="h-56">
                                                                        {(!myProfileData.blocks || myProfileData.blocks.length === 0) ? (
                                                                            <div className="flex items-center justify-center h-full text-slate-400 text-sm italic">No tracking data available</div>
                                                                        ) : !hasDetailedData ? (
                                                                            <div className="flex flex-col items-center justify-center h-full text-amber-500 text-sm p-4 text-center">
                                                                                <AlertTriangle className="w-8 h-8 mb-2 opacity-50" />
                                                                                <p className="font-bold">Backend Update Required</p>
                                                                                <p className="text-slate-500 text-xs mt-1">Detailed charts require the latest 'backend.js' update.</p>
                                                                            </div>
                                                                        ) : (RechartsLineChart && RechartsResponsiveContainer && RechartsLine && RechartsXAxis && RechartsYAxis && RechartsCartesianGrid && RechartsTooltip) ? (
                                                                            <RechartsResponsiveContainer width="100%" height="100%">
                                                                                <RechartsLineChart data={chartHistory}>
                                                                                    <RechartsCartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                                                    <RechartsXAxis dataKey="topic" tick={{ fontSize: 9, fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                                                    <RechartsYAxis domain={[0, 100]} tick={{ fontSize: 10, fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                                                    <RechartsTooltip
                                                                                        content={({ active, payload }) => {
                                                                                            if (!active || !payload || !payload.length) return null;
                                                                                            const d = payload[0].payload;
                                                                                            return (
                                                                                                <div style={{ background: 'white', border: '1px solid #e2e8f0', borderRadius: '8px', padding: '8px 12px', fontSize: '12px', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}>
                                                                                                    <p style={{ fontWeight: 'bold', marginBottom: '2px', color: '#0f172a' }}>{d.topic}</p>
                                                                                                    <p style={{ color: '#64748b', fontSize: '11px', marginBottom: '4px' }}>{d.date}</p>
                                                                                                    <p style={{ color: '#3b82f6', fontWeight: 'bold' }}>{d.percentage}%</p>
                                                                                                </div>
                                                                                            );
                                                                                        }} />
                                                                                    <RechartsLine type="monotone" dataKey="percentage" stroke="#3b82f6" strokeWidth={3} dot={{ r: 4, strokeWidth: 2, fill: '#fff' }} activeDot={{ r: 6 }} isAnimationActive={false} />
                                                                                </RechartsLineChart>
                                                                            </RechartsResponsiveContainer>
                                                                        ) : (
                                                                            <div className="flex items-center justify-center h-full text-slate-400 text-sm text-center">Chart library failed to load<br />(Check hospital firewall)</div>
                                                                        )}
                                                                    </div>
                                                                </div>

                                                                {/* Bar Chart: Categories */}
                                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                                                    <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center gap-2"><BarChartIcon className="w-4 h-4 text-indigo-500" /> Subject Mastery</h3>
                                                                    <div className="h-72">
                                                                        {(!myProfileData.blocks || myProfileData.blocks.length === 0) ? (
                                                                            <div className="flex items-center justify-center h-full text-slate-400 text-sm italic">No tracking data available</div>
                                                                        ) : !hasDetailedData ? (
                                                                            <div className="flex flex-col items-center justify-center h-full text-amber-500 text-sm p-4 text-center">
                                                                                <AlertTriangle className="w-8 h-8 mb-2 opacity-50" />
                                                                                <p className="font-bold">Backend Update Required</p>
                                                                                <p className="text-slate-500 text-xs mt-1">Detailed charts require the latest 'backend.js' update.</p>
                                                                            </div>
                                                                        ) : (RechartsBarChart && RechartsResponsiveContainer && RechartsBar && RechartsXAxis && RechartsYAxis && RechartsCartesianGrid && RechartsTooltip) ? (
                                                                            <RechartsResponsiveContainer width="100%" height="100%">
                                                                                <RechartsBarChart data={chartTopics.slice(0, 10)} margin={{ bottom: 70, left: -10, right: 10, top: 4 }}>
                                                                                    <RechartsCartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                                                    <RechartsXAxis dataKey="topic" tick={{ fontSize: 9, fill: '#64748b' }} axisLine={false} tickLine={false} interval={0} angle={-45} textAnchor="end" height={80} />
                                                                                    <RechartsYAxis domain={[0, 100]} tick={{ fontSize: 10, fill: '#64748b' }} axisLine={false} tickLine={false} unit="%" />
                                                                                    <RechartsTooltip cursor={{ fill: '#f8fafc' }} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '11px' }} />
                                                                                    <RechartsBar dataKey="percentage" minPointSize={4} barSize={30} radius={[4, 4, 0, 0]} isAnimationActive={false}
                                                                                        shape={(props) => {
                                                                                            const { x, y, width, height, value } = props;
                                                                                            const color = value >= 70 ? '#22c55e' : value >= 50 ? '#f59e0b' : '#ef4444';
                                                                                            const r = Math.min(4, width / 2);
                                                                                            return <rect x={x} y={y} width={width} height={height} rx={r} ry={r} fill={color} />;
                                                                                        }}
                                                                                    />
                                                                                </RechartsBarChart>
                                                                            </RechartsResponsiveContainer>
                                                                        ) : (
                                                                            <div className="flex items-center justify-center h-full text-slate-400 text-sm text-center">Chart library failed to load<br />(Check hospital firewall)</div>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {/* DATA TABLES ROW */}
                                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                                {/* Assessment History Table */}
                                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col max-h-64">
                                                                    <h3 className="font-bold text-slate-700 mb-3 text-sm flex items-center gap-2"><CheckCircle className="w-4 h-4 text-blue-500" /> Assessment History</h3>
                                                                    <div className="overflow-y-auto pr-2 flex-1">
                                                                        {(!myProfileData.blocks || myProfileData.blocks.length === 0) ? <p className="text-xs text-slate-400 italic">No blocks completed.</p> : (
                                                                            <table className="w-full text-xs">
                                                                                <thead className="sticky top-0 bg-white text-slate-500 text-left"><tr><th className="pb-2">Date</th><th className="pb-2">Topic</th><th className="pb-2 text-right">Score</th><th className="pb-2 text-right">Pts</th></tr></thead>
                                                                                <tbody>
                                                                                    {/* Display newest first in table */}
                                                                                    {(Array.isArray(myProfileData.blocks) ? myProfileData.blocks : []).map((b, i) => b ? <tr key={i} className="border-t border-slate-100"><td className="py-2">{b.date}</td><td className="py-2 truncate max-w-[150px]">{b.topic}</td><td className="py-2 text-right font-bold">{b.percentage !== undefined ? `${b.percentage}%` : b.score}</td><td className="py-2 text-right text-blue-600 font-bold">+{b.points}</td></tr> : null)}
                                                                                </tbody>
                                                                            </table>
                                                                        )}
                                                                    </div>
                                                                </div>

                                                                {/* Attendance History Table */}
                                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col max-h-64">
                                                                    <h3 className="font-bold text-slate-700 mb-3 text-sm flex items-center gap-2"><CalendarCheck className="w-4 h-4 text-emerald-500" /> Attendance History</h3>
                                                                    <div className="overflow-y-auto pr-2 flex-1">
                                                                        {(!myProfileData.conferences || myProfileData.conferences.length === 0) ? <p className="text-xs text-slate-400 italic">No attendance recorded.</p> : (
                                                                            <table className="w-full text-xs">
                                                                                <thead className="sticky top-0 bg-white text-slate-500 text-left"><tr><th className="pb-2">Date</th><th className="pb-2">Conference Topic</th><th className="pb-2 text-center">Status</th><th className="pb-2 text-right">Pts</th></tr></thead>
                                                                                <tbody>
                                                                                    {/* Display newest first in table */}
                                                                                    {(Array.isArray(myProfileData.conferences) ? myProfileData.conferences : []).map((c, i) => c ? (
                                                                                        <tr key={i} className="border-t border-slate-100">
                                                                                            <td className="py-2">{c.date}</td>
                                                                                            <td className="py-2 truncate max-w-[150px]">{c.topic}</td>
                                                                                            <td className="py-2 text-center">
                                                                                                <span className={`px-2 py-0.5 rounded-full font-black text-[8px] uppercase tracking-tighter ${c.points > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                                                                                    {c.points > 0 ? 'Attended' : 'Missed'}
                                                                                                </span>
                                                                                            </td>
                                                                                            <td className={`py-2 text-right font-bold ${c.points > 0 ? 'text-emerald-600' : 'text-slate-300'}`}>
                                                                                                {c.points > 0 ? `+${c.points}` : '0'}
                                                                                            </td>
                                                                                        </tr>
                                                                                    ) : null)}
                                                                                </tbody>
                                                                            </table>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </>
                                                    );
                                                })()}
                                            </div>
                                        )}
                                    </ErrorBoundary>
                                </div>
                            </div>
                        )}

                        {/* GLOBAL MODALS */}
                        {alertConfig && <AlertModal message={alertConfig.message} onClose={() => setAlertConfig(null)} />}
                        {confirmConfig && <ConfirmModal message={confirmConfig.message} title={confirmConfig.title} confirmText={confirmConfig.confirmText} onConfirm={() => { confirmConfig.onConfirm(); setConfirmConfig(null); }} onCancel={() => setConfirmConfig(null)} />}

                        {/* BADGE CELEBRATION OVERLAY */}
                        {badgeCelebration && (() => {
                            const IconComp = { Zap, Award, TrendingUp, Activity, BookOpen, Star, Sliders, Trophy, Clock, Calendar }[badgeCelebration.icon] || Star;
                            const confettiColors = ['#f59e0b', '#3b82f6', '#22c55e', '#a855f7', '#ef4444', '#06b6d4'];
                            const particles = Array.from({ length: 28 }, (_, i) => ({
                                left: `${5 + Math.random() * 90}%`,
                                top: `${-5 - Math.random() * 10}%`,
                                color: confettiColors[i % confettiColors.length],
                                duration: `${1.8 + Math.random() * 1.6}s`,
                                delay: `${Math.random() * 0.5}s`,
                                size: `${7 + Math.random() * 8}px`,
                                rotate: Math.random() > 0.5 ? 'skewX(10deg)' : 'skewY(10deg)',
                            }));
                            // Auto-dismiss after 4 seconds
                            setTimeout(() => setBadgeCelebration(null), 4000);
                            return (
                                <div className="fixed inset-0 z-[500] flex items-end justify-center pb-16 px-4" onClick={() => setBadgeCelebration(null)} style={{ background: 'rgba(0,0,0,0.35)', backdropFilter: 'blur(2px)' }}>
                                    {/* Confetti */}
                                    {particles.map((p, i) => (
                                        <div key={i} className="confetti-particle" style={{ left: p.left, top: p.top, background: p.color, width: p.size, height: p.size, animationDuration: p.duration, animationDelay: p.delay, transform: p.rotate }} />
                                    ))}
                                    {/* Card */}
                                    <div className="badge-slide-up w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                                        <div className="p-1" style={{ background: 'linear-gradient(135deg, #f59e0b, #a855f7, #3b82f6)' }} />
                                        <div className="p-8 flex flex-col items-center text-center">
                                            <div className="badge-icon-pop w-24 h-24 rounded-3xl flex items-center justify-center mb-5 shadow-xl" style={{ background: 'linear-gradient(135deg, #fef3c7, #fde68a)' }}>
                                                <IconComp className={`w-12 h-12 ${badgeCelebration.color}`} />
                                            </div>
                                            <p className="text-xs font-black text-amber-500 uppercase tracking-widest mb-2">Badge Earned!</p>
                                            <h2 className="text-2xl font-black text-slate-900 mb-2">{badgeCelebration.label}</h2>
                                            <p className="text-sm text-slate-500 mb-6">{badgeCelebration.desc}</p>
                                            <button onClick={() => setBadgeCelebration(null)} className="px-8 py-3 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-700 transition-all active:scale-95 text-sm">
                                                Awesome!
                                            </button>
                                            <p className="text-[10px] text-slate-300 mt-3">Tap anywhere to dismiss</p>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <FMCQuizApp />
            </ErrorBoundary>
        );
    </script>
</body>

</html>
